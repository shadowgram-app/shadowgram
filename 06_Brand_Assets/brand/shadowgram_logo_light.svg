<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <radialGradient id="sgCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   style="stop-color:#D4A017;stop-opacity:1"/>
      <stop offset="40%"  style="stop-color:#B8860B;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#7A5800;stop-opacity:0"/>
    </radialGradient>

    <linearGradient id="sgText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#8A6400;stop-opacity:1"/>
      <stop offset="60%"  style="stop-color:#B8860B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7A5800;stop-opacity:1"/>
    </linearGradient>

    <filter id="sgGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 배경: 투명 (라이트 테마용) -->

  <!-- 동심원 3개 -->
  <circle cx="80" cy="80" r="55" fill="none" stroke="#B8860B" stroke-width="0.5" opacity="0.2"/>
  <circle cx="80" cy="80" r="38" fill="none" stroke="#B8860B" stroke-width="0.5" opacity="0.3"/>
  <circle cx="80" cy="80" r="20" fill="none" stroke="#B8860B" stroke-width="0.7" opacity="0.4"/>

  <!-- 8개 방사 축선 -->
  <line x1="80" y1="80" x2="119" y2="41"  stroke="#B8860B" stroke-width="0.8" opacity="0.35"/>
  <line x1="80" y1="80" x2="80"  y2="25"  stroke="#B8860B" stroke-width="0.8" opacity="0.35"/>
  <line x1="80" y1="80" x2="41"  y2="41"  stroke="#B8860B" stroke-width="0.8" opacity="0.35"/>
  <line x1="80" y1="80" x2="25"  y2="80"  stroke="#B8860B" stroke-width="0.8" opacity="0.35"/>
  <line x1="80" y1="80" x2="41"  y2="119" stroke="#B8860B" stroke-width="0.8" opacity="0.35"/>
  <line x1="80" y1="80" x2="80"  y2="135" stroke="#B8860B" stroke-width="0.8" opacity="0.35"/>
  <line x1="80" y1="80" x2="119" y2="119" stroke="#B8860B" stroke-width="0.8" opacity="0.35"/>
  <line x1="80" y1="80" x2="135" y2="80"  stroke="#B8860B" stroke-width="0.8" opacity="0.35"/>

  <!-- 8개 유형 끝점 -->
  <circle cx="119" cy="41"  r="2.5" fill="#B8860B" opacity="0.55"/>
  <circle cx="80"  cy="25"  r="2.5" fill="#B8860B" opacity="0.55"/>
  <circle cx="41"  cy="41"  r="2.5" fill="#B8860B" opacity="0.55"/>
  <circle cx="25"  cy="80"  r="2.5" fill="#B8860B" opacity="0.55"/>
  <circle cx="41"  cy="119" r="2.5" fill="#B8860B" opacity="0.55"/>
  <circle cx="80"  cy="135" r="2.5" fill="#B8860B" opacity="0.55"/>
  <circle cx="119" cy="119" r="2.5" fill="#B8860B" opacity="0.55"/>
  <circle cx="135" cy="80"  r="2.5" fill="#B8860B" opacity="0.55"/>

  <!-- 빛 영역 -->
  <path d="
    M 80 25
    C 92 28, 108 44, 112 62
    C 116 76, 108 90, 100 100
    C 92 110, 80 118, 80 118
    C 66 110, 52 96, 50 80
    C 48 64, 56 48, 68 38
    C 74 32, 78 25, 80 25 Z
  " fill="#B8860B" opacity="0.06"/>

  <!-- 중심 코어 -->
  <circle cx="80" cy="80" r="7"   fill="url(#sgCore)" filter="url(#sgGlow)"/>
  <circle cx="80" cy="80" r="3.5" fill="#C8940A" opacity="0.9"/>
  <circle cx="80" cy="80" r="1.5" fill="#B8860B"/>

  <!-- 워드마크 -->
  <!-- Shadow — 라이트 웨이트, 진한 실버 -->
  <text x="158" y="76"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="300"
    letter-spacing="5"
    fill="#6B7A8D">Shadow</text>

  <!-- gram — 골드, 볼드 -->
  <text x="158" y="110"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="700"
    letter-spacing="5"
    fill="url(#sgText)">gram</text>

  <!-- 구분선 -->
  <line x1="158" y1="116" x2="410" y2="116"
    stroke="#B8860B" stroke-width="0.6" opacity="0.3"/>

  <!-- 서브라인 -->
  <text x="160" y="132"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="9"
    font-weight="400"
    letter-spacing="3"
    fill="#6B7A8D"
    opacity="0.6">8-Type Psyche Mapping  ·  shadowgram.org</text>

</svg>
