<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowgram Couple — 커플 소통 스타일 분석</title>
<meta property="og:title" content="우리 커플 소통 스타일, 얼마나 잘 맞을까요? 👀"/>
<meta property="og:description" content="24문항으로 알아보는 우리 둘의 케미 — Shadowgram Couple"/>
<meta property="og:image" content="https://shadowgram.org/og-couple.png"/>
<style>
:root{
  --bg:#0D1117;--card:#161B22;--border:#2A3040;
  --gold:#C9A84C;--silver:#8899AA;--text:#E8E8F0;
  --green:#6B9E6B;--purple:#8A70C0;--red:#E07050;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}

/* 별 배경 */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(201,168,76,0.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(138,112,192,0.04) 0%,transparent 60%);pointer-events:none;z-index:0;}

.wrap{max-width:480px;margin:0 auto;padding:24px 16px 80px;position:relative;z-index:1;}

/* 헤더 */
.hd{text-align:center;padding:32px 0 28px;}
.hd-badge{font-size:9px;letter-spacing:3px;color:var(--gold);margin-bottom:12px;}
.hd-title{font-size:24px;font-weight:900;line-height:1.3;margin-bottom:8px;}
.hd-sub{font-size:13px;color:var(--silver);line-height:1.6;}

/* 진행바 */
.prog-wrap{margin-bottom:28px;}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--silver);margin-bottom:6px;}
.prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),#E8D090);border-radius:2px;transition:width 0.4s ease;}

/* 단계 표시 */
.phase-chip{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:11px;color:var(--silver);margin-bottom:20px;}
.phase-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);}

/* 문항 카드 */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px 20px;margin-bottom:16px;opacity:0;animation:fadeUp 0.4s forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
.q-num{font-size:10px;letter-spacing:2px;color:var(--gold);margin-bottom:10px;}
.q-text{font-size:16px;font-weight:700;line-height:1.5;margin-bottom:20px;}

/* A/B 버튼 */
.ab-wrap{display:flex;flex-direction:column;gap:10px;}
.ab-btn{background:transparent;border:1px solid var(--border);border-radius:14px;padding:14px 16px;text-align:left;color:var(--text);font-size:14px;font-family:inherit;cursor:pointer;transition:all 0.2s;display:flex;align-items:flex-start;gap:12px;line-height:1.5;}
.ab-btn:hover{border-color:var(--gold);background:rgba(201,168,76,0.06);}
.ab-btn.selected{border-color:var(--gold);background:rgba(201,168,76,0.12);}
.ab-label{font-size:11px;font-weight:900;color:var(--gold);min-width:18px;margin-top:2px;}

/* 3점 척도 */
.scale3-wrap{display:flex;flex-direction:column;gap:8px;}
.scale3-row{display:flex;align-items:center;gap:0;background:var(--border);border-radius:14px;overflow:hidden;}
.scale3-side{flex:1;padding:12px 10px;text-align:center;font-size:12px;color:var(--silver);line-height:1.4;background:var(--card);border:1px solid var(--border);}
.scale3-side.left{border-radius:14px 0 0 14px;border-right:none;}
.scale3-side.right{border-radius:0 14px 14px 0;border-left:none;}
.scale3-mid{width:80px;min-width:80px;text-align:center;background:var(--card);border-top:1px solid var(--border);border-bottom:1px solid var(--border);font-size:11px;color:var(--silver);padding:12px 4px;}
.scale3-btns{display:flex;width:100%;margin-top:8px;}
.scale3-btns button{flex:1;padding:12px 0;background:var(--card);border:1px solid var(--border);color:var(--silver);font-size:12px;font-family:inherit;cursor:pointer;transition:all 0.2s;}
.scale3-btns button:first-child{border-radius:14px 0 0 14px;}
.scale3-btns button:last-child{border-radius:0 14px 14px 0;}
.scale3-btns button:hover{background:rgba(201,168,76,0.08);color:var(--text);}
.scale3-btns button.selected{background:rgba(201,168,76,0.15);border-color:var(--gold);color:var(--gold);font-weight:700;}

/* 네비 버튼 */
.nav-row{display:flex;gap:10px;margin-top:8px;}
.btn-prev{flex:1;padding:14px;background:transparent;border:1px solid var(--border);border-radius:14px;color:var(--silver);font-size:14px;font-family:inherit;cursor:pointer;}
.btn-next{flex:2;padding:14px;background:linear-gradient(135deg,var(--gold),#E8D090);border:none;border-radius:14px;color:#1A1A00;font-size:15px;font-weight:900;font-family:inherit;cursor:pointer;transition:opacity 0.2s;}
.btn-next:disabled{opacity:0.3;cursor:not-allowed;}

/* 완료 화면 */
.done-wrap{display:none;text-align:center;padding:40px 0;}
.done-icon{font-size:56px;margin-bottom:16px;}
.done-type{font-size:28px;font-weight:900;margin-bottom:6px;}
.done-sub{font-size:14px;color:var(--silver);margin-bottom:32px;line-height:1.6;}
.done-card{background:var(--card);border:1px solid var(--gold);border-radius:20px;padding:24px;margin-bottom:24px;}
.done-label{font-size:10px;letter-spacing:2px;color:var(--gold);margin-bottom:8px;}
.done-desc{font-size:14px;line-height:1.7;color:var(--text);}

/* 파트너 입력 */
.partner-wrap{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:20px;}
.partner-title{font-size:14px;font-weight:700;margin-bottom:6px;}
.partner-sub{font-size:12px;color:var(--silver);margin-bottom:16px;line-height:1.5;}
.partner-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s;}
.partner-input:focus{border-color:var(--gold);}
.partner-input::placeholder{color:var(--silver);}

/* 결과 버튼 */
.btn-result{width:100%;padding:16px;background:linear-gradient(135deg,var(--gold),#E8D090);border:none;border-radius:16px;color:#1A1A00;font-size:16px;font-weight:900;font-family:inherit;cursor:pointer;margin-bottom:12px;}
.btn-solo{width:100%;padding:14px;background:transparent;border:1px solid var(--border);border-radius:16px;color:var(--silver);font-size:13px;font-family:inherit;cursor:pointer;}

/* 면책 */
.disclaimer{font-size:10px;color:var(--silver);text-align:center;margin-top:24px;line-height:1.6;opacity:0.6;}

/* 토스트 */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,35,50,0.96);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:13px;color:var(--text);opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <div class="hd-badge">✦ SHADOWGRAM COUPLE ✦</div>
    <div class="hd-title">우리 둘, 얼마나<br>잘 맞을까요? 💫</div>
    <div class="hd-sub">24가지 상황으로 알아보는<br>우리 커플 소통 스타일</div>
  </div>

  <!-- 진행바 -->
  <div class="prog-wrap">
    <div class="prog-label">
      <span id="prog-step">1 / 24</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <!-- 단계 표시 -->
  <div id="phase-label" class="phase-chip">
    <div class="phase-dot"></div>
    <span id="phase-text">1단계 · 내 소통 스타일 찾기</span>
  </div>

  <!-- 문항 영역 -->
  <div id="q-area"></div>

  <!-- 완료 화면 -->
  <div class="done-wrap" id="done-wrap">
    <div class="done-icon" id="done-icon">✨</div>
    <div class="done-type" id="done-type">SPARK</div>
    <div class="done-sub" id="done-sub">끊임없는 아이디어와 에너지로<br>주변을 밝히는 타입이에요.</div>

    <div class="done-card">
      <div class="done-label">✦ 나의 소통 스타일</div>
      <div class="done-desc" id="done-desc">—</div>
    </div>

    <div class="partner-wrap">
      <div class="partner-title">💑 파트너 링크 공유하기</div>
      <div class="partner-sub">파트너도 같이 해보면 우리 둘의 케미를 바로 확인할 수 있어요!</div>
      <input class="partner-input" id="partner-link" type="text" readonly placeholder="링크 생성 중..." onclick="copyPartnerLink()"/>
    </div>

    <button class="btn-result" id="btn-result" onclick="goResult()">🔍 우리 둘 케미 바로 보기</button>
    <button class="btn-solo" onclick="goResultSolo()">혼자 먼저 결과 보기</button>

    <div class="disclaimer">
      이 분석은 오락·참고 목적의 커플 소통 스타일 분석이며,<br>전문적인 상담을 대체하지 않습니다.<br>
      shadowgram.org · © 2025 Shadowgram
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 유형 정의
const TYPES = {
  STEADY: {icon:'🌿', name:'STEADY', sub:'꾸준하고 신뢰를 쌓아가는 타입이에요.', desc:'안정적인 루틴과 약속을 소중히 여겨요. 파트너에게 든든한 버팀목이 되는 타입으로, 말보다 행동으로 사랑을 표현해요.'},
  SPARK:  {icon:'🔥', name:'SPARK',  sub:'끊임없는 아이디어와 에너지로 주변을 밝히는 타입이에요.', desc:'새로운 것에 설레고 즉흥적인 계획도 즐겨요. 대화 중 반짝이는 아이디어를 자주 던지고, 파트너를 신선한 경험으로 이끌어요.'},
  PLAYER: {icon:'⚡', name:'PLAYER', sub:'지금 이 순간을 즐기는 활기찬 타입이에요.', desc:'현재에 충실하고 행동이 빠른 편이에요. 같이 있으면 에너지가 넘치고, 새로운 경험을 함께 나누는 것을 좋아해요.'},
  VISION: {icon:'🔮', name:'VISION', sub:'깊이 있는 통찰과 큰 그림을 보는 타입이에요.', desc:'직관적이고 의미 있는 연결을 중요하게 생각해요. 대화에서 본질을 찾고, 파트너와 깊은 이해를 나누고 싶어 해요.'},
  LOGIC:  {icon:'⚙️', name:'LOGIC',  sub:'논리적이고 명확한 커뮤니케이션을 선호하는 타입이에요.', desc:'감정보다 사실과 구조로 소통해요. 문제를 차분하게 분석하고, 파트너에게 합리적인 해결책을 제시하는 것을 편하게 여겨요.'},
  HARMONY:{icon:'🌸', name:'HARMONY',sub:'따뜻하고 배려 깊은 분위기 메이커 타입이에요.', desc:'주변 사람들의 감정에 민감하고 조화로운 관계를 중시해요. 파트너가 행복한지 자주 살피고, 갈등은 부드럽게 풀어나가요.'},
  LEADER: {icon:'👑', name:'LEADER', sub:'명확한 방향성과 추진력으로 이끄는 타입이에요.', desc:'목표가 있으면 빠르게 움직이는 편이에요. 관계에서도 솔직하고 직접적인 소통을 선호하며, 파트너의 성장을 적극 응원해요.'},
  SOUL:   {icon:'🌙', name:'SOUL',   sub:'감성이 깊고 자신만의 세계가 있는 타입이에요.', desc:'내면의 가치와 감정을 중요하게 여겨요. 표현은 조용하지만 깊은 진심이 담겨 있고, 진정성 있는 연결을 원해요.'},
};

// ── 1단계: A/B 12문항 (유형 판별)
// 각 문항: {q, a, b, axis} axis = [유형득점방향]
// 점수 구조: 8유형 각각 0~12점 누적, 최고점 유형이 결과
const Q_AB = [
  {q:"갑자기 주말 계획이 바뀌었어요. 나는?",
   a:{text:"솔직히 좀 불편해요. 미리 알았으면 좋았을 텐데.", scores:{STEADY:2,VISION:1}},
   b:{text:"오히려 설레요! 즉흥이 더 재미있을 때도 있잖아요.", scores:{SPARK:2,PLAYER:1}}},

  {q:"파트너와 대화할 때 나는 더 자주?",
   a:{text:"내 생각이나 아이디어를 먼저 꺼내요.", scores:{SPARK:2,LEADER:1}},
   b:{text:"상대방 말을 먼저 충분히 들어요.", scores:{HARMONY:2,SOUL:1}}},

  {q:"우리가 크게 싸웠을 때, 나의 첫 반응은?",
   a:{text:"일단 상황을 정리하고 싶어요. 감정보다 해결이 먼저예요.", scores:{LOGIC:2,LEADER:1}},
   b:{text:"감정이 먼저 올라와요. 바로 이야기해야 풀려요.", scores:{HARMONY:2,SOUL:1}}},

  {q:"파트너에게 사랑을 표현하는 나만의 방식은?",
   a:{text:"행동으로 보여줘요. 챙겨주고 함께 시간을 보내요.", scores:{STEADY:2,PLAYER:1}},
   b:{text:"말로 직접 표현해요. 솔직하게 감정을 꺼내요.", scores:{SPARK:1,HARMONY:2}}},

  {q:"5년 후 우리 커플의 모습을 상상할 때 나는?",
   a:{text:"구체적인 계획과 일정이 머릿속에 그려져요.", scores:{STEADY:2,LEADER:1}},
   b:{text:"큰 방향이나 느낌만 있어요. 세부사항은 흘러가면서 정해지겠죠.", scores:{VISION:2,SPARK:1}}},

  {q:"파트너가 고민을 털어놓을 때, 나는?",
   a:{text:"해결책을 같이 찾아줘요. 뭔가 도움이 되고 싶어요.", scores:{LOGIC:2,LEADER:1}},
   b:{text:"일단 다 들어줘요. 공감이 먼저라고 생각해요.", scores:{HARMONY:2,SOUL:1}}},

  {q:"새로운 것을 시도하는 것에 대해 나는?",
   a:{text:"검증된 방법이 편해요. 익숙한 것이 더 좋아요.", scores:{STEADY:2,LOGIC:1}},
   b:{text:"새로운 시도가 좋아요! 안 해본 게 더 재미있잖아요.", scores:{SPARK:2,PLAYER:1}}},

  {q:"관계에서 나에게 가장 중요한 건?",
   a:{text:"서로 믿고 편안한 것. 안정감이 제일이에요.", scores:{STEADY:2,HARMONY:1}},
   b:{text:"서로 성장하고 자극받는 것. 함께 더 나아가는 느낌이요.", scores:{VISION:2,LEADER:1}}},

  {q:"파트너와 의견이 다를 때, 나는?",
   a:{text:"논리적으로 내 입장을 설명해요.", scores:{LOGIC:2,LEADER:1}},
   b:{text:"우선 상대방 입장을 이해하려고 해요.", scores:{HARMONY:2,SOUL:1}}},

  {q:"혼자만의 시간이 필요할 때, 나는?",
   a:{text:"솔직하게 말해요. '나 혼자 있고 싶어'라고요.", scores:{SOUL:2,LOGIC:1}},
   b:{text:"눈치를 보거나 천천히 자연스럽게 거리를 둬요.", scores:{STEADY:1,VISION:2}}},

  {q:"우리가 함께 있을 때 나는 주로?",
   a:{text:"에너지가 올라가요. 같이 있는 게 충전이 돼요.", scores:{PLAYER:2,SPARK:1}},
   b:{text:"편안한데 가끔 혼자 시간이 그리워요.", scores:{SOUL:2,VISION:1}}},

  {q:"파트너에게 솔직하게 말해야 할 상황에서 나는?",
   a:{text:"직접 말해요. 돌려 말하는 게 더 불편해요.", scores:{LEADER:2,LOGIC:1}},
   b:{text:"어떻게 말해야 상처가 안 될지 고민이 더 돼요.", scores:{HARMONY:2,SOUL:1}}},
];

// ── 2단계: 3점 척도 12문항 (8축 점수 보정)
// axis: 점수 귀속 축 [left 선택시 +2, mid +1, right +0] or 반대
// axes: 성실(0) 자발(1) 활력(2) 통찰(3) 논리(4) 공감(5) 추진(6) 감성(7)
const AXES = ['성실','자발','활력','통찰','논리','공감','추진','감성'];
const Q_SCALE = [
  {q:"일상에서 계획대로 움직이는 게 얼마나 편한가요?",
   left:"계획이 있어야 안심돼요",right:"흐름대로가 더 좋아요",
   scores:[[2,1,0],[0,1,2]], axes:[0,1]}, // 성실↑ or 자발↑

  {q:"새로운 아이디어가 떠오르는 빈도는?",
   left:"자주 떠올라요",right:"별로 없어요",
   scores:[[2,1,0],[0,1,2]], axes:[1,3]}, // 자발↑ or 통찰↑

  {q:"사람들과 함께 있을 때 에너지는?",
   left:"충전돼요",right:"소모돼요",
   scores:[[2,1,0],[0,1,2]], axes:[2,7]}, // 활력↑ or 감성↑

  {q:"대화할 때 직관이나 느낌을 얼마나 신뢰하나요?",
   left:"많이 믿어요",right:"별로 안 믿어요",
   scores:[[2,1,0],[0,1,2]], axes:[3,4]}, // 통찰↑ or 논리↑

  {q:"갈등 상황에서 논리와 감정 중 뭐가 먼저 나오나요?",
   left:"논리가 먼저요",right:"감정이 먼저요",
   scores:[[2,1,0],[0,1,2]], axes:[4,5]}, // 논리↑ or 공감↑

  {q:"파트너의 기분이 안 좋을 때, 나는 얼마나 빨리 눈치채나요?",
   left:"바로 알아요",right:"나중에 알게 돼요",
   scores:[[2,1,0],[0,1,2]], axes:[5,4]}, // 공감↑ or 논리↑

  {q:"그룹에서 방향이나 결정을 이끄는 편인가요?",
   left:"자주 이끄는 편이에요",right:"따라가는 편이에요",
   scores:[[2,1,0],[0,1,2]], axes:[6,5]}, // 추진↑ or 공감↑

  {q:"감정을 말로 표현하는 게 얼마나 쉬운가요?",
   left:"쉬워요",right:"어렵고 불편해요",
   scores:[[2,1,0],[0,1,2]], axes:[7,4]}, // 감성↑ or 논리↑

  {q:"오늘 당장 해야 할 일을 미루는 편인가요?",
   left:"잘 안 미뤄요",right:"자주 미뤄요",
   scores:[[2,1,0],[0,1,2]], axes:[0,1]}, // 성실↑ or 자발↑

  {q:"행동하기 전에 분석하는 시간이 얼마나 필요한가요?",
   left:"충분히 분석해요",right:"일단 해보고 생각해요",
   scores:[[2,1,0],[0,1,2]], axes:[4,2]}, // 논리↑ or 활력↑

  {q:"파트너와 깊은 대화를 얼마나 자주 하고 싶은가요?",
   left:"자주 하고 싶어요",right:"가끔이면 충분해요",
   scores:[[2,1,0],[0,1,2]], axes:[7,3]}, // 감성↑ or 통찰↑

  {q:"목표를 세우면 중간에 방향을 바꾸는 경우가 얼마나 되나요?",
   left:"거의 안 바꿔요",right:"자주 바꿔요",
   scores:[[2,1,0],[0,1,2]], axes:[6,1]}, // 추진↑ or 자발↑
];

// ── 상태
let currentQ = 0; // 0~23
let phase = 1; // 1 or 2
let answers = new Array(24).fill(null);
// phase1 answers: 0 or 1 (a=0, b=1)
// phase2 answers: 0,1,2 (left=0, mid=1, right=2)

let typeScores = {STEADY:0,SPARK:0,PLAYER:0,VISION:0,LOGIC:0,HARMONY:0,LEADER:0,SOUL:0};
let axisScores = [50,50,50,50,50,50,50,50]; // 기본값 50

// ── 렌더
function render(){
  const total=24;
  const done = currentQ;
  const pct = Math.round(done/total*100);
  document.getElementById('prog-step').textContent=`${done+1} / ${total}`;
  document.getElementById('prog-pct').textContent=`${pct}%`;
  document.getElementById('prog-fill').style.width=pct+'%';

  const phaseText = currentQ < 12
    ? '1단계 · 소통 스타일 찾기'
    : '2단계 · 우리 케미 측정하기';
  document.getElementById('phase-text').textContent = phaseText;

  const area = document.getElementById('q-area');
  area.innerHTML='';

  if(currentQ < 12){
    renderAB(area);
  } else {
    renderScale(area);
  }
}

function renderAB(area){
  const qi = currentQ;
  const q = Q_AB[qi];
  const card = document.createElement('div');
  card.className='q-card';
  const prevAns = answers[qi];

  card.innerHTML=`
    <div class="q-num">Q${qi+1}.</div>
    <div class="q-text">${q.q}</div>
    <div class="ab-wrap">
      <button class="ab-btn${prevAns===0?' selected':''}" onclick="selectAB(${qi},0)">
        <span class="ab-label">A</span><span>${q.a.text}</span>
      </button>
      <button class="ab-btn${prevAns===1?' selected':''}" onclick="selectAB(${qi},1)">
        <span class="ab-label">B</span><span>${q.b.text}</span>
      </button>
    </div>
    <div class="nav-row" style="margin-top:20px;">
      ${qi>0?`<button class="btn-prev" onclick="prevQ()">← 이전</button>`:''}
      <button class="btn-next" id="btn-next" onclick="nextQ()" ${prevAns===null?'disabled':''}>
        ${qi===11?'2단계로 →':'다음 →'}
      </button>
    </div>
  `;
  area.appendChild(card);
}

function renderScale(area){
  const qi = currentQ;
  const si = qi - 12;
  const q = Q_SCALE[si];
  const prevAns = answers[qi];

  const card = document.createElement('div');
  card.className='q-card';

  card.innerHTML=`
    <div class="q-num">Q${qi+1}. <span style="font-size:9px;color:var(--silver);letter-spacing:1px;">소통 스타일 측정</span></div>
    <div class="q-text">${q.q}</div>
    <div class="scale3-wrap">
      <div style="display:flex;gap:0;">
        <div class="scale3-side left">${q.left}</div>
        <div class="scale3-mid">중간</div>
        <div class="scale3-side right">${q.right}</div>
      </div>
      <div class="scale3-btns">
        <button onclick="selectScale(${qi},0)" class="${prevAns===0?'selected':''}">이쪽에<br>가까워요</button>
        <button onclick="selectScale(${qi},1)" style="border-left:none;border-right:none;" class="${prevAns===1?'selected':''}">반반<br>이에요</button>
        <button onclick="selectScale(${qi},2)" class="${prevAns===2?'selected':''}">저쪽에<br>가까워요</button>
      </div>
    </div>
    <div class="nav-row" style="margin-top:20px;">
      <button class="btn-prev" onclick="prevQ()">← 이전</button>
      <button class="btn-next" id="btn-next" onclick="nextQ()" ${prevAns===null?'disabled':''}>
        ${qi===23?'결과 보기 🔍':'다음 →'}
      </button>
    </div>
  `;
  area.appendChild(card);
}

// ── 선택
function selectAB(qi, val){
  answers[qi]=val;
  // 선택 시 시각 피드백
  const btns = document.querySelectorAll('.ab-btn');
  btns.forEach((b,i)=>{
    b.classList.toggle('selected', i===val);
  });
  document.getElementById('btn-next').disabled=false;
  // 0.25초 뒤 자동 다음
  setTimeout(()=>nextQ(), 280);
}

function selectScale(qi, val){
  answers[qi]=val;
  const btns = document.querySelectorAll('.scale3-btns button');
  btns.forEach((b,i)=>b.classList.toggle('selected', i===val));
  document.getElementById('btn-next').disabled=false;
  setTimeout(()=>nextQ(), 280);
}

function nextQ(){
  if(answers[currentQ]===null) return;
  if(currentQ===23){
    calcResult();
    return;
  }
  currentQ++;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function prevQ(){
  if(currentQ===0) return;
  currentQ--;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── 결과 계산
function calcResult(){
  // 1단계: 유형 점수 집계
  typeScores = {STEADY:0,SPARK:0,PLAYER:0,VISION:0,LOGIC:0,HARMONY:0,LEADER:0,SOUL:0};
  for(let i=0;i<12;i++){
    const q = Q_AB[i];
    const choice = answers[i]; // 0=a, 1=b
    const sc = choice===0 ? q.a.scores : q.b.scores;
    for(const [t,v] of Object.entries(sc)){
      typeScores[t] = (typeScores[t]||0) + v;
    }
  }

  // 1단계 최고 유형
  let myType = Object.entries(typeScores).sort((a,b)=>b[1]-a[1])[0][0];

  // 2단계: 8축 점수 보정
  axisScores = [50,50,50,50,50,50,50,50];
  for(let i=0;i<12;i++){
    const q = Q_SCALE[i];
    const choice = answers[12+i]; // 0=left, 1=mid, 2=right
    const [ax0, ax1] = q.axes;
    if(choice===0){
      axisScores[ax0] = Math.min(100, axisScores[ax0] + 15);
      axisScores[ax1] = Math.max(0, axisScores[ax1] - 5);
    } else if(choice===1){
      axisScores[ax0] = Math.min(100, axisScores[ax0] + 5);
      axisScores[ax1] = Math.min(100, axisScores[ax1] + 5);
    } else {
      axisScores[ax1] = Math.min(100, axisScores[ax1] + 15);
      axisScores[ax0] = Math.max(0, axisScores[ax0] - 5);
    }
  }

  showResult(myType);
}

function showResult(type){
  // 문항 영역 숨기기
  document.getElementById('q-area').style.display='none';
  document.querySelector('.prog-wrap').style.display='none';
  document.getElementById('phase-label').style.display='none';

  const t = TYPES[type];
  const done = document.getElementById('done-wrap');
  done.style.display='block';
  document.getElementById('done-icon').textContent=t.icon;
  document.getElementById('done-type').textContent=t.name;
  document.getElementById('done-sub').textContent=t.sub;
  document.getElementById('done-desc').textContent=t.desc;

  // 파트너 링크 생성 (내 타입 + 축 점수 인코딩)
  const axStr = axisScores.map(v=>Math.round(v)).join(',');
  const base = window.location.origin + '/couple/kr/test/';
  const partnerUrl = `${base}?ref=${type}&ax=${encodeURIComponent(axStr)}`;
  document.getElementById('partner-link').value = partnerUrl;

  // 이미 파트너 ref가 있는지 확인
  const params = new URLSearchParams(window.location.search);
  const partnerType = params.get('ref');
  if(partnerType && TYPES[partnerType]){
    document.getElementById('btn-result').textContent = `🔍 ${type} × ${partnerType} 케미 보러 가기`;
  }
}

function goResult(){
  const params = new URLSearchParams(window.location.search);
  const partnerType = params.get('ref');

  // 내 타입 다시 계산
  const myType = Object.entries(typeScores).sort((a,b)=>b[1]-a[1])[0][0];

  if(partnerType && TYPES[partnerType]){
    window.location.href = `/couple/kr/result/?a=${myType}&b=${partnerType}`;
  } else {
    // 파트너 링크 복사 안내
    copyPartnerLink();
    showToast('💛 파트너에게 링크를 보내고 같이 해보세요!');
  }
}

function goResultSolo(){
  const myType = Object.entries(typeScores).sort((a,b)=>b[1]-a[1])[0][0];
  window.location.href = `/couple/kr/result/?a=${myType}&b=${myType}`;
}

function copyPartnerLink(){
  const val = document.getElementById('partner-link').value;
  if(!val) return;
  if(navigator.clipboard){
    navigator.clipboard.writeText(val).then(()=>showToast('🔗 링크가 복사됐어요! 파트너에게 보내보세요 💛'));
  } else {
    const el = document.getElementById('partner-link');
    el.select();
    document.execCommand('copy');
    showToast('🔗 링크가 복사됐어요! 파트너에게 보내보세요 💛');
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── 초기화
render();
</script>
</body>
</html>
